name: Atualizar dados territoriais e documentais dos cemitérios

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/**"
      - "data/reference/**"
      - "docs/PROTOCOLO_ESTATISTICO_REPLICAVEL.md"
      - ".github/workflows/atualizar-geosampa.yml"
  push:
    paths:
      - "scripts/fetch_geosampa_cemiterios.py"
      - "scripts/fetch_geosampa_vegetation.py"
      - "scripts/analyze_cemetery_vegetation.py"
      - "scripts/fetch_geosampa_contexto.py"
      - "scripts/fetch_ibge_districts_sp.py"
      - "scripts/extract_ibge_income_dictionary.py"
      - "scripts/fetch_ipvs_2022.py"
      - "scripts/build_ipvs_context.py"
      - "scripts/inspect_sim_mortality.py"
      - "scripts/fetch_ossuary_annex.py"
      - "scripts/geocode_agencias.py"
      - "scripts/build_cemiterios_concessao.py"
      - "scripts/validate_cemetery_environmental_footprint.py"
      - "scripts/spatial_join_admin.py"
      - "scripts/build_socioeconomic_context.py"
      - "scripts/analyze_center_periphery.py"
      - "scripts/build_interactive_map.py"
      - "scripts/build_static_map.py"
      - "scripts/build_network_map.py"
      - "data/reference/cemiterios_crematorio.csv"
      - "data/reference/agencias_funerarias.csv"
      - "data/reference/geosampa_mapping.csv"
      - ".github/workflows/atualizar-geosampa.yml"

permissions:
  contents: write

jobs:
  coletar-e-processar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: python -m pip install --upgrade pip pyproj shapely folium matplotlib adjustText pypdf openpyxl pyshp dbfread

      - name: Consultar cemitérios no WFS do GeoSampa
        run: python scripts/fetch_geosampa_cemiterios.py

      - name: Consultar distritos e subprefeituras
        run: python scripts/fetch_geosampa_contexto.py

      - name: Coletar renda e cor ou raça nos 96 distritos paulistanos
        run: python scripts/fetch_ibge_districts_sp.py

      - name: Extrair dicionário oficial das variáveis de renda
        run: python scripts/extract_ibge_income_dictionary.py

      - name: Coletar e filtrar o IPVS 2022 para o Município de São Paulo
        run: python scripts/fetch_ipvs_2022.py

      - name: Inspecionar estrutura do SIM sem persistir microdados
        run: python scripts/inspect_sim_mortality.py

      - name: Extrair anexo contratual sobre tratamento de ossadas
        run: python scripts/fetch_ossuary_annex.py

      - name: Filtrar equipamentos da concessão e calcular centroides
        run: python scripts/build_cemiterios_concessao.py

      - name: Validar a extensão territorial dos equipamentos
        run: python scripts/validate_cemetery_environmental_footprint.py

      - name: Coletar cobertura vegetal de 2017 no entorno dos cemitérios
        run: python scripts/fetch_geosampa_vegetation.py

      - name: Calcular cobertura vegetal dentro dos cemitérios
        run: python scripts/analyze_cemetery_vegetation.py

      - name: Associar distritos e subprefeituras por área
        run: python scripts/spatial_join_admin.py

      - name: Integrar renda e composição racial do contexto distrital
        run: python scripts/build_socioeconomic_context.py

      - name: Calcular o IPVS no entorno dos cemitérios
        run: python scripts/build_ipvs_context.py

      - name: Calcular indicadores de centro e periferia
        run: python scripts/analyze_center_periphery.py

      - name: Geocodificar agências funerárias
        run: python scripts/geocode_agencias.py

      - name: Gerar mapa interativo
        run: python scripts/build_interactive_map.py

      - name: Gerar mapa estático dos estratos
        run: python scripts/build_static_map.py

      - name: Gerar mapa real da rede funerária
        run: python scripts/build_network_map.py

      - name: Publicar artefato cartográfico e metodológico
        uses: actions/upload-artifact@v4
        with:
          name: mapa-rede-funeraria-e-metodologia
          if-no-files-found: error
          path: |
            maps/mapa_rede_funeraria_real.png
            maps/mapa_rede_funeraria_real.svg
            data/processed/agencias_geocodificadas.csv
            data/processed/agencias_geocodificadas_4326.geojson
            data/processed/resumo_area_territorial_cemiterios.json
            data/processed/cemiterios_cobertura_vegetal_2017.csv
            data/processed/resumo_cobertura_vegetal_cemiterios_2017.json
            data/raw/geosampa/cobertura_vegetal_2017_entorno_cemiterios_metadata.json
            docs/RELATORIO_GEOCODIFICACAO_AGENCIAS.md
            docs/PROTOCOLO_ESTATISTICO_REPLICAVEL.md
            docs/VALIDACAO_AREA_TERRITORIAL_E_COBERTURA_VERDE.md
            docs/RESULTADOS_COBERTURA_VEGETAL_CEMITERIOS.md

      - name: Registrar produtos atualizados
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/geosampa data/raw/ibge data/raw/seade data/raw/sim data/raw/contracts data/raw/geocoding data/processed maps docs/RESULTADOS_PRELIMINARES.md docs/RESULTADOS_SOCIOECONOMICOS.md docs/RESULTADOS_IPVS_2022.md docs/RELATORIO_GEOCODIFICACAO_AGENCIAS.md docs/VALIDACAO_AREA_TERRITORIAL_E_COBERTURA_VERDE.md docs/RESULTADOS_COBERTURA_VEGETAL_CEMITERIOS.md
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nos dados territoriais e documentais."
          else
            git commit -m "Atualiza cobertura vegetal e contexto socioespacial"
            git push
          fi
