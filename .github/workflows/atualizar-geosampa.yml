name: Atualizar camada de cemitérios do GeoSampa

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/fetch_geosampa_cemiterios.py"
      - ".github/workflows/atualizar-geosampa.yml"

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: python -m pip install --upgrade pip pyproj

      - name: Consultar WFS do GeoSampa
        run: python scripts/fetch_geosampa_cemiterios.py

      - name: Registrar produtos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/geosampa data/processed/geosampa_cemiterios.csv data/processed/geosampa_cemiterios_4326.geojson data/processed/geosampa_cemiterios_metadata.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nos dados do GeoSampa."
          else
            git commit -m "Atualiza camada oficial de cemitérios do GeoSampa"
            git push
          fi
