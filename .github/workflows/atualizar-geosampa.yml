name: Atualizar camada de cemitérios do GeoSampa

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/fetch_geosampa_cemiterios.py"
      - "scripts/fetch_geosampa_contexto.py"
      - "scripts/build_cemiterios_concessao.py"
      - "scripts/spatial_join_admin.py"
      - "scripts/build_interactive_map.py"
      - "scripts/build_static_map.py"
      - "data/reference/cemiterios_crematorio.csv"
      - "data/reference/geosampa_mapping.csv"
      - ".github/workflows/atualizar-geosampa.yml"

permissions:
  contents: write

jobs:
  coletar-e-processar:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: python -m pip install --upgrade pip pyproj shapely folium matplotlib adjustText

      - name: Consultar cemitérios no WFS do GeoSampa
        run: python scripts/fetch_geosampa_cemiterios.py

      - name: Consultar distritos e subprefeituras
        run: python scripts/fetch_geosampa_contexto.py

      - name: Filtrar equipamentos da concessão e calcular centroides
        run: python scripts/build_cemiterios_concessao.py

      - name: Associar distritos e subprefeituras por área
        run: python scripts/spatial_join_admin.py

      - name: Gerar mapa interativo
        run: python scripts/build_interactive_map.py

      - name: Gerar mapa estático
        run: python scripts/build_static_map.py

      - name: Registrar produtos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/geosampa data/processed maps
          if git diff --cached --quiet; then
            echo "Nenhuma alteração nos dados do GeoSampa."
          else
            git commit -m "Atualiza dados, contexto administrativo e mapas"
            git push
          fi
